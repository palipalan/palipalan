<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>palipalan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nabla&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050814; 
            font-family: 'Courier New', Courier, monospace;
        }

        /* Animação da onda pulsante para o texto "palipalan" */
        @keyframes wave {
            0%, 100% { 
                transform: translateY(0); 
                filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
            }
            50% { 
                transform: translateY(-20px); 
                filter: drop-shadow(0 0 25px rgba(255, 230, 0, 0.9)) drop-shadow(0 0 50px rgba(255, 150, 0, 0.6));
            }
        }

        .wave-text {
            display: flex;
            justify-content: center;
            flex-wrap: nowrap;
            gap: 2px;
            font-family: 'Nabla', system-ui;
            font-size: clamp(2.5rem, 12vw, 6rem);
            font-weight: 900;
            letter-spacing: 0.02em;
            text-transform: lowercase;
            pointer-events: none;
            user-select: none;
            width: 100%;
            padding: 0 10px;
        }

        .wave-text span {
            display: inline-block;
            animation: wave 2s infinite ease-in-out;
        }

        .wave-text span:nth-child(1) { animation-delay: 0.0s; }
        .wave-text span:nth-child(2) { animation-delay: 0.1s; }
        .wave-text span:nth-child(3) { animation-delay: 0.2s; }
        .wave-text span:nth-child(4) { animation-delay: 0.3s; }
        .wave-text span:nth-child(5) { animation-delay: 0.4s; }
        .wave-text span:nth-child(6) { animation-delay: 0.5s; }
        .wave-text span:nth-child(7) { animation-delay: 0.6s; }
        .wave-text span:nth-child(8) { animation-delay: 0.7s; }
        .wave-text span:nth-child(9) { animation-delay: 0.8s; }

        /* --- FILTRO CRT TV --- */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .crt-overlay::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 100%), rgba(18, 16, 16, 0.1);
            opacity: 0.8; z-index: 101; pointer-events: none; animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.27; } 50% { opacity: 0.35; } 100% { opacity: 0.24; }
        }

    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div class="crt-overlay"></div>

    <!-- Fundo Ambiental que espelhará a TV (via YouTube API) -->
    <div id="ambient-bg" class="absolute inset-0 overflow-hidden bg-[#141414] flex justify-center items-center pointer-events-none" style="z-index: 0;">
        <div class="w-[150vw] h-[150vh] scale-x-[-1] opacity-40" style="filter: blur(80px); pointer-events: none;">
            <div id="player-bg" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <div id="canvas-container" class="absolute inset-0" style="z-index: 10;"></div>

    <div id="intro-text" class="absolute inset-x-0 top-0 pointer-events-none flex justify-center pt-8 md:pt-16 lg:pt-20" style="z-index: 20; opacity: 0; transition: opacity 3s ease-in-out;">
        <div class="wave-text">
            <span>p</span><span>a</span><span>l</span><span>i</span><span>p</span><span>a</span><span>l</span><span>a</span><span>n</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

        // --- INTEGRAÇÃO YOUTUBE API PARA SINCRONIZAÇÃO PERFEITA ---
        let playerTv, playerBg;
        let isYtReady = false;

        window.onYouTubeIframeAPIReady = function() {
            const playlistId = 'PL7nYDn3_K58TRUbhQzgFLDNlfhmQdJFUr';
            
            // Fundo (Mudo e Desfocado)
            playerBg = new YT.Player('player-bg', {
                playerVars: { 
                    autoplay: 1, mute: 1, controls: 0, disablekb: 1, 
                    loop: 1, listType: 'playlist', list: playlistId 
                },
                events: {
                    'onReady': () => {
                        isYtReady = true;
                        playerBg.mute(); // Força o mute garantido
                    }
                }
            });

            // TV Principal conectando ao iframe gerado dinamicamente
            playerTv = new YT.Player('player-tv-iframe', {
                events: {
                    'onStateChange': (event) => {
                        if (!isYtReady || !playerBg || !playerBg.playVideo) return;
                        
                        const state = event.data;
                        if (state === 1) { // 1 = PLAYING
                            const tvIndex = playerTv.getPlaylistIndex();
                            // Atualiza a playlist perfeitamente se a TV saltar de música
                            if (tvIndex !== playerBg.getPlaylistIndex()) {
                                playerBg.playVideoAt(tvIndex);
                            } else {
                                playerBg.playVideo();
                            }
                        } else if (state === 2 || state === 3) { // 2 = PAUSED, 3 = BUFFERING
                            // Fundo reflete perfeitamente quando a TV para
                            playerBg.pauseVideo();
                        }
                    }
                }
            });
        };

        // Injeta o script da API do YouTube
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);


        // --- CONFIGURAÇÃO THREE.JS ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const fogColor = new THREE.Color(0x141414); 
        scene.fog = new THREE.FogExp2(fogColor, 0.015); // Névoa significativamente reduzida para ver as estrelas ao fundo

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 15, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setClearColor(0x000000, 0); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const cssRenderer = new CSS3DRenderer();
        cssRenderer.setSize(window.innerWidth, window.innerHeight);
        cssRenderer.domElement.style.position = 'absolute';
        cssRenderer.domElement.style.top = '0px';
        cssRenderer.domElement.style.left = '0px';
        cssRenderer.domElement.style.pointerEvents = 'none';
        cssRenderer.domElement.style.zIndex = '15'; 
        document.body.appendChild(cssRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 20;
        controls.maxPolarAngle = Math.PI / 2 + 0.1;
        controls.minAzimuthAngle = -Math.PI / 3;
        controls.maxAzimuthAngle = Math.PI / 3;
        controls.target.set(0, 1.5, 0);
        controls.enabled = false;
        let isIntroPlaying = true;
        const targetCamPos = new THREE.Vector3(0, 3, 10);

        const ambientLight = new THREE.AmbientLight(0x404040, 4.0);
        scene.add(ambientLight);

        const moonLight = new THREE.DirectionalLight(0xffffff, 1.5);
        moonLight.position.set(-5, 10, 5);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.width = 1024;
        moonLight.shadow.mapSize.height = 1024;
        scene.add(moonLight);

        // Feixe de Luz Amarela
        const beamHeight = 15.0; 
        const beamZ = 3.0; 
        const beamLight = new THREE.SpotLight(0xffdd00, 40.0); 
        beamLight.position.set(0, beamHeight, beamZ); 
        beamLight.target.position.set(0, 1.0, 0); 
        beamLight.angle = Math.PI / 4.5; 
        beamLight.penumbra = 0.6;
        beamLight.castShadow = true;
        scene.add(beamLight);
        scene.add(beamLight.target);

        const beamGeo = new THREE.CylinderGeometry(0.01, 5.5, beamHeight, 32, 1, true);
        beamGeo.translate(0, beamHeight / 2, 0); 
        const posAttribute = beamGeo.attributes.position;
        for (let i = 0; i < posAttribute.count; i++) {
            const y = posAttribute.getY(i);
            const zShift = (y / beamHeight) * beamZ; 
            posAttribute.setZ(i, posAttribute.getZ(i) + zShift);
        }
        beamGeo.computeVertexNormals();

        const beamMat = new THREE.ShaderMaterial({
            uniforms: {
                beamColor: { value: new THREE.Color(0xffdd00) },
                beamOpacity: { value: 0.08 }
            },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `uniform vec3 beamColor; uniform float beamOpacity; varying vec2 vUv; void main() { float fadeBottom = smoothstep(0.0, 0.25, vUv.y); float fadeTop = smoothstep(1.0, 0.6, vUv.y); gl_FragColor = vec4(beamColor, beamOpacity * fadeBottom * fadeTop); }`,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
        });
        const beamMesh = new THREE.Mesh(beamGeo, beamMat);
        scene.add(beamMesh);

        // --- CÉU ESTRELADO 3D (EM TODO O ESPAÇO) ---
        
        // 1. Sistema de Partículas 3D (As Estrelas Verdadeiras)
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 4000;
        const posArray = new Float32Array(starsCount * 3);
        const colorArray = new Float32Array(starsCount * 3);

        for(let i = 0; i < starsCount * 3; i+=3) {
            // Distribuição ampla em todas as direções (X, Y, Z) formando uma caixa envolvente
            posArray[i] = (Math.random() - 0.5) * 150;     // X
            posArray[i+1] = (Math.random() - 0.5) * 150;   // Y (Agora também ocupa a parte superior, flutuando no espaço)
            posArray[i+2] = (Math.random() - 0.5) * 150;   // Z

            // Cores vibrantes e aleatórias (espectro néon)
            const color = new THREE.Color();
            color.setHSL(Math.random(), 0.9, 0.6); // Hue aleatório, alta saturação e luminosidade
            colorArray[i] = color.r;
            colorArray[i+1] = color.g;
            colorArray[i+2] = color.b;
        }

        starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        starsGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

        const starsMat = new THREE.PointsMaterial({
            size: 0.2,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            sizeAttenuation: true
        });
        const starField = new THREE.Points(starsGeo, starsMat);
        scene.add(starField);

        // --- TAPETE ---
        const rugGeo = new THREE.BoxGeometry(8.0, 0.05, 5.5); 
        const rugMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.0 });
        rugMat.onBeforeCompile = (shader) => {
            shader.defines = shader.defines || {}; 
            shader.defines.USE_UV = ''; 
            shader.uniforms.time = { value: 0 };
            rugMat.userData.shader = shader; 
            
            shader.fragmentShader = `uniform float time;\n ${shader.fragmentShader}`.replace(`#include <color_fragment>`, `
                #include <color_fragment>
                vec2 uv = vUv; vec2 center = uv - 0.5; center.x *= 1.45; vec2 warp = uv * 12.0; float t = time * 0.3;
                warp.x += sin(warp.y * 0.8 + t); warp.y += cos(warp.x * 0.8 - t * 0.5);
                float pattern = sin(warp.x) * cos(warp.y); pattern += sin(warp.x * 2.0 - t) * cos(warp.y * 2.0) * 0.5;
                float r = length(center); float angle = atan(center.y, center.x); float medallion = r + sin(angle * 12.0 + time * 1.5) * 0.03; 
                vec3 carmine = vec3(1.0, 0.0, 0.2); 
                vec3 gold = vec3(1.0, 0.8, 0.0);    
                vec3 navy = vec3(0.0, 0.2, 1.0);    
                vec3 cream = vec3(1.0, 1.0, 0.9);   
                vec3 rugColor = mix(carmine, navy, smoothstep(-0.4, 0.4, pattern)); rugColor = mix(rugColor, cream, smoothstep(0.7, 1.0, pattern));
                if (medallion < 0.25) { rugColor = mix(gold, carmine, smoothstep(0.0, 0.2, pattern + r)); } else if (medallion < 0.28) { rugColor = gold; }
                float borderX = min(uv.x, 1.0 - uv.x); float borderY = min(uv.y, 1.0 - uv.y); float minDist = min(borderX, borderY);
                if (minDist < 0.02) rugColor = cream; else if (minDist < 0.06) rugColor = navy; else if (minDist < 0.07) rugColor = gold;
                else if (minDist < 0.15) rugColor = mix(carmine, gold, smoothstep(-0.5, 0.5, sin(uv.x * 40.0 + time) * cos(uv.y * 40.0 - time)));
                else if (minDist < 0.16) rugColor = gold;
                diffuseColor.rgb = mix(diffuseColor.rgb, rugColor * 1.2, 0.95);
            `);
        };
        const rug = new THREE.Mesh(rugGeo, rugMat);
        rug.position.y = 0.025; rug.position.z = -0.8; rug.receiveShadow = true;
        scene.add(rug);

        // --- MESA DE CENTRO E ACESSÓRIOS ---
        const tableGroup = new THREE.Group();
        tableGroup.position.set(0, 0.35, 2.5);
        scene.add(tableGroup);

        const tableTopGeo = new THREE.BoxGeometry(4.5, 0.08, 1.4);
        const tableTopMat = new THREE.MeshStandardMaterial({ color: 0x2a160b, roughness: 0.4, metalness: 0.2 });
        const tableTop = new THREE.Mesh(tableTopGeo, tableTopMat);
        tableTop.castShadow = true;
        tableTop.receiveShadow = true;
        tableGroup.add(tableTop);

        const legGeo = new THREE.CylinderGeometry(0.04, 0.02, 0.31, 16);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.4 });
        const legPositions = [
            [-2.0, -0.195, -0.5], [2.0, -0.195, -0.5],
            [-2.0, -0.195, 0.5], [2.0, -0.195, 0.5]
        ];
        legPositions.forEach(pos => {
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(pos[0], pos[1], pos[2]);
            leg.castShadow = true;
            tableGroup.add(leg);
        });

        // --- PLANTA PALIPALAN (Paepalanthus / Chuveirinho) ---
        const potGeo = new THREE.CylinderGeometry(0.12, 0.09, 0.15, 16);
        const potMat = new THREE.MeshStandardMaterial({ color: 0x8a5a44, roughness: 0.9 });
        const pot = new THREE.Mesh(potGeo, potMat);
        pot.position.set(1.4, 0.115, 0.15);
        pot.castShadow = true;
        tableGroup.add(pot);

        const dirtGeo = new THREE.CylinderGeometry(0.11, 0.11, 0.02, 16);
        const dirtMat = new THREE.MeshStandardMaterial({ color: 0x2b1c12, roughness: 1.0 });
        const dirt = new THREE.Mesh(dirtGeo, dirtMat);
        dirt.position.set(0, 0.07, 0);
        pot.add(dirt);

        const baseStemGeo = new THREE.CylinderGeometry(0.02, 0.035, 0.1, 8);
        const baseStemMat = new THREE.MeshStandardMaterial({ color: 0xd28f5a, roughness: 0.9 });
        const baseStem = new THREE.Mesh(baseStemGeo, baseStemMat);
        baseStem.position.set(0, 0.12, 0);
        pot.add(baseStem);

        const stalksGroup = new THREE.Group();
        stalksGroup.position.set(0, 0.05, 0);
        baseStem.add(stalksGroup);

        const stalkGeo = new THREE.CylinderGeometry(0.002, 0.003, 1, 4);
        stalkGeo.rotateX(Math.PI / 2);
        const stalkMat = new THREE.MeshStandardMaterial({ color: 0xb5b582, roughness: 0.8 });
        const headGeo = new THREE.SphereGeometry(0.012, 8, 8);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xddddcc, roughness: 0.9 });
        const dotGeo = new THREE.SphereGeometry(0.005, 4, 4);
        const dotMat = new THREE.MeshBasicMaterial({ color: 0x222222 });

        const numStalks = 180;
        const goldenAngle = 2.39996323;
        for (let i = 0; i < numStalks; i++) {
            const t = i / (numStalks - 1);
            const y = 1.0 - (t * 0.9);
            const radius = Math.sqrt(1 - y * y);
            const theta = goldenAngle * i;
            const x = Math.cos(theta) * radius;
            const z = Math.sin(theta) * radius;

            const pivot = new THREE.Group();
            const length = 0.4 + Math.random() * 0.1;

            const stalk = new THREE.Mesh(stalkGeo, stalkMat);
            stalk.scale.set(1, 1, length);
            stalk.position.set(0, 0, length / 2);
            pivot.add(stalk);

            const headGroup = new THREE.Group();
            headGroup.position.set(0, 0, length);
            const head = new THREE.Mesh(headGeo, headMat);
            head.scale.set(1, 0.7, 1);
            headGroup.add(head);
            const dot = new THREE.Mesh(dotGeo, dotMat);
            dot.position.set(0, 0.01, 0);
            headGroup.add(dot);
            pivot.add(headGroup);

            pivot.lookAt(new THREE.Vector3(x, y, z));
            stalksGroup.add(pivot);
        }

        // Cinzeiro
        const ashtrayGeo = new THREE.TorusGeometry(0.16, 0.05, 16, 32);
        const ashtrayMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.8 });
        const ashtray = new THREE.Mesh(ashtrayGeo, ashtrayMat);
        ashtray.position.set(0.6, 0.09, 0.3);
        ashtray.rotation.x = Math.PI / 2;
        ashtray.castShadow = true;
        tableGroup.add(ashtray);

        const ashtrayBase = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.02, 32), ashtrayMat);
        ashtrayBase.position.set(0.6, 0.05, 0.3);
        tableGroup.add(ashtrayBase);

        // Cigarro
        const cigGeo = new THREE.CylinderGeometry(0.012, 0.012, 0.15, 8);
        const cigMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
        const cig = new THREE.Mesh(cigGeo, cigMat);
        cig.position.set(0.72, 0.14, 0.3);
        cig.rotation.z = Math.PI / 2;
        cig.rotation.y = Math.PI / 4;
        cig.castShadow = true;
        tableGroup.add(cig);

        const tipGeo = new THREE.CylinderGeometry(0.013, 0.013, 0.02, 8);
        const tipMat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 2.5 });
        const tip = new THREE.Mesh(tipGeo, tipMat);
        tip.position.set(-0.075, 0, 0);
        cig.add(tip);

        // Sistema de Fumaça
        const smokeCount = 45;
        const smokeGeo = new THREE.BufferGeometry();
        const smokePos = new Float32Array(smokeCount * 3);
        const smokeLife = new Float32Array(smokeCount);
        for (let i = 0; i < smokeCount; i++) {
            smokePos[i*3] = 0; smokePos[i*3+1] = 0; smokePos[i*3+2] = 0;
            smokeLife[i] = Math.random();
        }
        smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePos, 3));
        smokeGeo.setAttribute('life', new THREE.BufferAttribute(smokeLife, 1));

        const smokeMat = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                smokeColor: { value: new THREE.Color(0xdddddd) }
            },
            vertexShader: `
                attribute float life;
                varying float vLife;
                uniform float time;
                void main() {
                    vLife = life;
                    float currentLife = fract(life + time * 0.15);
                    vec3 pos = position;
                    pos.y += currentLife * 1.5;
                    pos.x += sin(currentLife * 4.0 + life * 10.0) * 0.2 * currentLife;
                    pos.z += cos(currentLife * 3.0 + life * 10.0) * 0.2 * currentLife;
                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_Position = projectionMatrix * mvPosition;
                    gl_PointSize = (15.0 + currentLife * 40.0) * (3.0 / -mvPosition.z);
                }
            `,
            fragmentShader: `
                uniform vec3 smokeColor;
                varying float vLife;
                uniform float time;
                void main() {
                    float currentLife = fract(vLife + time * 0.15);
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    if (dist > 0.5) discard;
                    float alpha = smoothstep(0.0, 0.1, currentLife) * (1.0 - smoothstep(0.2, 1.0, currentLife));
                    alpha *= (1.0 - (dist * 2.0));
                    gl_FragColor = vec4(smokeColor, alpha * 0.12);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending
        });
        const smoke = new THREE.Points(smokeGeo, smokeMat);
        smoke.position.set(0.65, 0.14, 0.23);
        tableGroup.add(smoke);

        // --- PILHA DE VINIS (LPs) ---
        const vinylGroup = new THREE.Group();
        vinylGroup.position.set(-1.2, 0.045, 0);
        tableGroup.add(vinylGroup);

        const vinylSize = 0.8;
        const vinylThickness = 0.01;
        const vinylGeo = new THREE.BoxGeometry(vinylSize, vinylThickness, vinylSize);
        const vinylOffsets = [
            { x: -0.15, z: -0.15, rot: -0.2,  color: '#4a2511' },
            { x: 0.10,  z: -0.05, rot: 0.15,  color: '#1a332a' },
            { x: -0.05, z: 0.10,  rot: -0.05, color: '#22223b' },
            { x: 0.15,  z: 0.15,  rot: 0.25,  color: '#4a3b11' },
            { x: 0.0,   z: 0.05,  rot: 0.0,   color: '#3b1122' }
        ];

        function createVinylCover(index, colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = colorHex;
            ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 15;
            ctx.strokeRect(25, 25, 462, 462);
            ctx.beginPath();
            ctx.arc(256, 256, 180, 0, Math.PI * 2);
            ctx.stroke();
            ctx.font = 'bold 54px "Courier New"';
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('CAPA ' + index, 256, 240);
            ctx.font = '24px "Courier New"';
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillText('IMAGEM PLACEHOLDER', 256, 300);
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        for (let i = 0; i < 5; i++) {
            const coverTexture = createVinylCover(i + 1, vinylOffsets[i].color);
            const edgeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const coverMat = new THREE.MeshStandardMaterial({ map: coverTexture, roughness: 0.6 });
            const materials = [edgeMat, edgeMat, coverMat, edgeMat, edgeMat, edgeMat];
            const vinyl = new THREE.Mesh(vinylGeo, materials);
            vinyl.position.set(vinylOffsets[i].x, i * vinylThickness, vinylOffsets[i].z);
            vinyl.rotation.y = vinylOffsets[i].rot;
            vinyl.castShadow = true;
            vinyl.receiveShadow = true;
            vinylGroup.add(vinyl);
        }

        // --- CONSTRUÇÃO DO CONJUNTO (MÓVEL E TV) ---
        const tvGroup = new THREE.Group();

        // 1. MÓVEL (RACK) - Mantém o tamanho original
        const rackGeo = new THREE.BoxGeometry(4.5, 0.8, 3.5);
        const rackMat = new THREE.MeshStandardMaterial({ 
            color: 0x4a2e1b, 
            roughness: 0.6 
        });
        const rack = new THREE.Mesh(rackGeo, rackMat);
        rack.position.set(0, 0.4, -0.8); rack.castShadow = true; rack.receiveShadow = true;
        tvGroup.add(rack);

        // Pés metálicos redondos para o rack
        const footGeo = new THREE.CylinderGeometry(0.06, 0.03, 0.2, 16);
        const footMat = new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.8, roughness: 0.2});
        const feetPositions = [[-2.1, 0.1, 0.8], [2.1, 0.1, 0.8], [-2.1, 0.1, -2.4], [2.1, 0.1, -2.4]];
        feetPositions.forEach(pos => {
            const foot = new THREE.Mesh(footGeo, footMat);
            foot.position.set(pos[0], pos[1], pos[2]);
            foot.castShadow = true;
            tvGroup.add(foot);
        });

        // 2. TELEVISÃO CRT (GRUPO INDEPENDENTE PARA ESCALAR)
        const tvHardwareGroup = new THREE.Group();
        // Aumenta a TV em 25% (escala 1.25) em todos os eixos
        tvHardwareGroup.scale.set(1.25, 1.25, 1.25);
        // Ajusta o eixo Y para compensar a escala e continuar perfeitamente encostada na base
        tvHardwareGroup.position.y = -0.20;

        const tvMat = new THREE.MeshStandardMaterial({ color: 0x1f1a18, roughness: 0.6 });
        // Corpo frontal alargado (de 3.0 para 3.4) para acomodar o ecrã grande E os painéis laterais
        const tvFrontGeo = new THREE.BoxGeometry(3.4, 2.4, 0.6);
        const tvFront = new THREE.Mesh(tvFrontGeo, tvMat);
        tvFront.position.set(0, 2.0, 0); tvFront.castShadow = true; tvFront.receiveShadow = true;
        tvHardwareGroup.add(tvFront);

        // Grelha de alto-falante na TV (Esquerda) - Reposicionada
        const speakerGrillGeo = new THREE.BoxGeometry(0.3, 1.6, 0.62);
        const speakerGrillMat = new THREE.MeshStandardMaterial({color: 0x0a0a0a, roughness: 0.9});
        const tvSpeaker = new THREE.Mesh(speakerGrillGeo, speakerGrillMat);
        tvSpeaker.position.set(-1.45, 2.0, 0.0);
        tvHardwareGroup.add(tvSpeaker);

        // Botões Giratórios (Direita) - Reposicionados
        const tvKnobGeo = new THREE.CylinderGeometry(0.08, 0.1, 0.05, 16);
        tvKnobGeo.rotateX(Math.PI / 2);
        const tvKnobMat = new THREE.MeshStandardMaterial({color: 0xaaaaaa, metalness: 0.6, roughness: 0.4});
        const tvKnob1 = new THREE.Mesh(tvKnobGeo, tvKnobMat);
        tvKnob1.position.set(1.45, 2.5, 0.31);
        tvHardwareGroup.add(tvKnob1);
        const tvKnob2 = new THREE.Mesh(tvKnobGeo, tvKnobMat);
        tvKnob2.position.set(1.45, 2.2, 0.31);
        tvHardwareGroup.add(tvKnob2);
        
        // Botão de Power Vermelho - Reposicionado
        const tvPowerBtn = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 0.05), new THREE.MeshStandardMaterial({color: 0xcc0000}));
        tvPowerBtn.position.set(1.45, 1.5, 0.31);
        tvHardwareGroup.add(tvPowerBtn);

        // Antena no topo da TV (Estilo "Orelhas de Coelho")
        const antBaseGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.05, 16);
        const antMat = new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.9, roughness: 0.2});
        const antBase = new THREE.Mesh(antBaseGeo, antMat);
        antBase.position.set(0, 3.225, 0);
        tvHardwareGroup.add(antBase);
        const antPoleGeo = new THREE.CylinderGeometry(0.015, 0.015, 1.5, 8);
        const ant1 = new THREE.Mesh(antPoleGeo, antMat);
        ant1.position.set(-0.35, 3.8, 0);
        ant1.rotation.z = Math.PI / 6;
        tvHardwareGroup.add(ant1);
        const ant2 = new THREE.Mesh(antPoleGeo, antMat);
        ant2.position.set(0.35, 3.8, 0);
        ant2.rotation.z = -Math.PI / 6;
        tvHardwareGroup.add(ant2);

        // Corpo Central da caixa CRT alargado 
        const tvMidGeo = new THREE.BoxGeometry(3.0, 2.0, 1.2);
        const tvMid = new THREE.Mesh(tvMidGeo, tvMat);
        tvMid.position.set(0, 2.0, -0.9); tvMid.castShadow = true; tvMid.receiveShadow = true;
        tvHardwareGroup.add(tvMid);

        // Traseira do tubo alargada
        const tvBackGeo = new THREE.BoxGeometry(2.0, 1.4, 1.2);
        const tvBack = new THREE.Mesh(tvBackGeo, tvMat);
        tvBack.position.set(0, 2.0, -2.1); tvBack.castShadow = true; tvBack.receiveShadow = true;
        tvHardwareGroup.add(tvBack);

        // Moldura do Ecrã
        const frameGeo = new THREE.BoxGeometry(2.6, 2.0, 0.85);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.5 });
        const frame = new THREE.Mesh(frameGeo, frameMat);
        frame.position.set(0, 2.0, 0);
        tvHardwareGroup.add(frame);

        // Fundo da Tela
        const screenGeo = new THREE.PlaneGeometry(2.4, 1.8);
        const screenMat = new THREE.MeshStandardMaterial({ color: 0x020202, roughness: 0.2 });
        const screen = new THREE.Mesh(screenGeo, screenMat);
        screen.position.set(0, 2.0, 0.33); 
        tvHardwareGroup.add(screen);

        // Vidro CRT convexo refletivo sobre a tela (Corrigido para cobrir o ecrã todo)
        const glassGeo = new THREE.PlaneGeometry(2.45, 1.85, 16, 16);
        const glassPos = glassGeo.attributes.position;
        for(let i=0; i<glassPos.count; i++) {
            const x = glassPos.getX(i);
            const y = glassPos.getY(i);
            const bulge = Math.cos((x/2.45)*Math.PI) * Math.cos((y/1.85)*Math.PI) * 0.08;
            glassPos.setZ(i, bulge);
        }
        glassGeo.computeVertexNormals();
        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff, transmission: 1.0, opacity: 1, metalness: 0.2, roughness: 0.05, ior: 1.5, thickness: 0.5
        });
        const glassMesh = new THREE.Mesh(glassGeo, glassMat);
        glassMesh.position.set(0, 2.0, 0.35); 
        tvHardwareGroup.add(glassMesh);

        // --- TV PLAYER DIV ---
        const divInfo = document.createElement('div');
        divInfo.style.width = '1024px'; divInfo.style.height = '768px'; divInfo.style.backgroundColor = '#000';
        divInfo.style.pointerEvents = 'auto';
        
        const iframeTv = document.createElement('iframe');
        iframeTv.id = 'player-tv-iframe';
        iframeTv.style.width = '100%'; 
        iframeTv.style.height = '100%'; 
        iframeTv.style.border = '0'; 
        iframeTv.style.pointerEvents = 'auto'; 
        iframeTv.src = 'https://www.youtube.com/embed/videoseries?list=PL7nYDn3_K58TRUbhQzgFLDNlfhmQdJFUr&enablejsapi=1&autoplay=1&mute=0';
        iframeTv.allow = 'autoplay; encrypted-media; picture-in-picture'; 
        iframeTv.allowFullscreen = true;
        divInfo.appendChild(iframeTv);

        const cssObject = new CSS3DObject(divInfo);
        // Escala corrigida para caber nos 2.4 de largura (1024 * 0.00234375 = 2.4)
        cssObject.scale.set(0.00234375, 0.00234375, 0.00234375);
        cssObject.position.set(0, 2.0, 0.34); 
        tvHardwareGroup.add(cssObject);

        const tvLight = new THREE.PointLight(0xeeeeff, 1.5, 15);
        tvLight.position.set(0, 2.0, 1.0);
        tvLight.castShadow = true;
        tvHardwareGroup.add(tvLight);

        // Adiciona a TV completa e escalada ao grupo principal
        tvGroup.add(tvHardwareGroup);


        // --- ENTRADA VHS E FITA ---
        const vhsFrameGeo = new THREE.BoxGeometry(1.8, 0.45, 0.05);
        const vhsFrameMat = new THREE.MeshStandardMaterial({color: 0x1a1a1a, roughness: 0.8});
        const vhsFrame = new THREE.Mesh(vhsFrameGeo, vhsFrameMat);
        vhsFrame.position.set(-0.8, 0.4, 0.95);
        tvGroup.add(vhsFrame);

        const vhsHoleGeo = new THREE.BoxGeometry(1.6, 0.22, 0.06);
        const vhsHoleMat = new THREE.MeshBasicMaterial({color: 0x000000});
        const vhsHole = new THREE.Mesh(vhsHoleGeo, vhsHoleMat);
        vhsHole.position.set(-0.8, 0.4, 0.96);
        tvGroup.add(vhsHole);

        const vhsTapeGroup = new THREE.Group();
        vhsTapeGroup.position.set(-0.8, 0.4, 1.05);

        const tapeGeo = new THREE.BoxGeometry(1.4, 0.20, 0.9);
        const tapeMat = new THREE.MeshStandardMaterial({color: 0x121212, roughness: 0.7, metalness: 0.1});
        const tapeMesh = new THREE.Mesh(tapeGeo, tapeMat);
        tapeMesh.castShadow = true;
        vhsTapeGroup.add(tapeMesh);

        const labelGeo = new THREE.PlaneGeometry(1.15, 0.45);
        const labelCanvas = document.createElement('canvas');
        labelCanvas.width = 512; labelCanvas.height = 200;
        const lctx = labelCanvas.getContext('2d');
        const labelTexture = new THREE.CanvasTexture(labelCanvas);
        labelTexture.colorSpace = THREE.SRGBColorSpace;

        function drawLabel() {
            lctx.fillStyle = '#eae6cf';
            lctx.fillRect(0, 0, labelCanvas.width, labelCanvas.height);
            lctx.fillStyle = '#ba1a1a';
            lctx.fillRect(0, labelCanvas.height - 36, labelCanvas.width, 36);
            lctx.font = '28px "Permanent Marker", cursive';
            lctx.fillStyle = '#111118';
            lctx.textAlign = 'center';
            lctx.textBaseline = 'middle';
            lctx.save();
            lctx.translate(labelCanvas.width / 2, labelCanvas.height / 2 + 15);
            lctx.rotate(-0.03);
            lctx.fillText('Palipalan // #30dias30beats', 0, 0);
            lctx.restore();
            labelTexture.needsUpdate = true;
        }
        drawLabel();
        document.fonts.ready.then(drawLabel);

        const labelMat = new THREE.MeshStandardMaterial({map: labelTexture, roughness: 0.9});
        const labelMesh = new THREE.Mesh(labelGeo, labelMat);
        labelMesh.rotation.x = -Math.PI / 2;
        labelMesh.position.set(0, 0.101, 0.15);
        vhsTapeGroup.add(labelMesh);

        const spoolGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.01, 16);
        const spoolMat = new THREE.MeshStandardMaterial({color: 0x050505, roughness: 0.5});
        const spool1 = new THREE.Mesh(spoolGeo, spoolMat);
        spool1.position.set(-0.35, 0.102, -0.05);
        vhsTapeGroup.add(spool1);
        const spool2 = new THREE.Mesh(spoolGeo, spoolMat);
        spool2.position.set(0.35, 0.102, -0.05);
        vhsTapeGroup.add(spool2);
        tvGroup.add(vhsTapeGroup);

        const controlsGroup = new THREE.Group();
        const knobBaseGeo = new THREE.CylinderGeometry(0.08, 0.09, 0.02, 16); knobBaseGeo.rotateX(Math.PI / 2);
        const knobReactGeo = new THREE.CylinderGeometry(0.05, 0.06, 0.1, 16); knobReactGeo.rotateX(Math.PI / 2);
        const btnGeo = new THREE.BoxGeometry(0.15, 0.08, 0.1);
        const reactiveMats = [];
        const reactiveMeshes = [];
        
        for(let i = 0; i < 3; i++) {
            const baseMesh = new THREE.Mesh(knobBaseGeo, new THREE.MeshStandardMaterial({color: 0x555555, metalness: 0.8}));
            baseMesh.position.set(0.5 + i * 0.4, 0.4, 0.95);
            controlsGroup.add(baseMesh);

            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x111111, emissive: i === 0 ? 0xff0055 : (i === 1 ? 0x00aaff : 0xffaa00),
                emissiveIntensity: 0.0, roughness: 0.6
            });
            const mesh = new THREE.Mesh(i < 2 ? btnGeo : knobReactGeo, mat);
            mesh.position.set(0.5 + i * 0.4, 0.4, 0.97); 
            controlsGroup.add(mesh);
            reactiveMats.push(mat); reactiveMeshes.push(mesh);
        }
        tvGroup.add(controlsGroup);

        scene.add(tvGroup);


        // --- LOOP PRINCIPAL E LÓGICA DE SINCRONIZAÇÃO ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (rugMat.userData.shader) rugMat.userData.shader.uniforms.time.value = time;
            smokeMat.uniforms.time.value = time;
            
            starField.rotation.y = time * 0.02;

            // --- ANIMAÇÃO DE ENTRADA ---
            if (isIntroPlaying) {
                camera.position.lerp(targetCamPos, 0.015);
                camera.lookAt(0, 1.5, 0);
                if (camera.position.distanceTo(targetCamPos) < 0.5) {
                    isIntroPlaying = false;
                    controls.enabled = true;
                    controls.update();
                    const introText = document.getElementById('intro-text');
                    if (introText) introText.style.opacity = '1';
                }
            } else {
                controls.update();
            }

            // Lógica de Sincronização Contínua dos Vídeos (Micro-ajustes de velocidade)
            if (isYtReady && playerTv && playerBg && playerTv.getPlayerState && playerBg.getPlayerState) {
                if (playerTv.getPlayerState() === 1 && playerBg.getPlayerState() === 1) {
                    const tvTime = playerTv.getCurrentTime();
                    const bgTime = playerBg.getCurrentTime();
                    const diff = tvTime - bgTime;
                    
                    // Ajuste de velocidade em tempo real para sincronização simultânea sem travamentos!
                    if (Math.abs(diff) > 1.5) {
                        playerBg.seekTo(tvTime, true);
                    } else if (diff > 0.15) {
                        playerBg.setPlaybackRate(1.25); // Fundo acelera para alcançar
                    } else if (diff < -0.15) {
                        playerBg.setPlaybackRate(0.75); // Fundo abranda para esperar
                    } else {
                        playerBg.setPlaybackRate(1.0);  // Sincronizado perfeitamente
                    }
                }
            }

            // Batidas Falsas (Reatividade Visual)
            const beat1 = Math.pow(Math.sin(time * 5.0), 4);
            const beat2 = Math.pow(Math.cos(time * 2.5), 2);
            const randomSpike = Math.random() > 0.95 ? Math.random() : 0;

            reactiveMeshes.forEach((mesh, index) => {
                const intensity = index === 0 ? beat1 : (index === 1 ? beat2 : randomSpike);
                reactiveMats[index].emissiveIntensity = intensity * 2.5;
                mesh.position.z = 0.96 + intensity * 0.03; 
            });

            const pulse = Math.sin(time * 3);
            beamLight.intensity = 30.0 + pulse * 10.0;
            beamMat.uniforms.beamOpacity.value = 0.08 + pulse * 0.03;
            tvLight.intensity = 1.5 + Math.random() * 0.4;

            renderer.render(scene, camera);
            cssRenderer.render(scene, camera); 
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = () => { animate(); };

    </script>
</body>
</html>
